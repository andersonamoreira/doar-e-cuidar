services:

  backend:
    build: ./backend
    container_name: dec-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads:/app/uploads
    networks:
      - dec-net
      - dec-db-shared   # acesso ao PostgreSQL existente no servidor
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: dec-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - uploads:/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dec-net
      - dec-web-shared  # acessível pelo nginx principal do servidor

networks:
  dec-net:
    driver: bridge
  dec-db-shared:
    external: true   # criada manualmente no servidor
  dec-web-shared:
    external: true   # criada manualmente no servidor

volumes:
  uploads:
